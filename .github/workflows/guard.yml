name: Lux Sleep Guard

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install python-telegram-bot==20.7
      - name: Run guard
        env:
          SLEEP_BOT_TOKEN: ${{ secrets.SLEEP_BOT_TOKEN }}
          YOUR_USER_ID: ${{ secrets.YOUR_USER_ID }}
          MAIN_BOT_USERNAME: ${{ secrets.MAIN_BOT_USERNAME }}
        run: python guard_bot.py
